{% extends "emails/base_email.html" %}

{% block email_meta_title %}{{ announcement_subject }}{% endblock %}

{% block content %}
<div style="padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 16px; line-height: 1.8; color: #374151; max-width: 540px; margin: 0 auto;">
    {% if subscriber.first_name %}
    <p style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 16px; line-height: 1.8; color: #374151; margin: 0 0 20px 0;">
        Hello {{ subscriber.first_name }},
    </p>
    {% endif %}

    {{ announcement_body|safe }}
</div>
{% endblock %}
