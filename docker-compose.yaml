services:
  db:
    image: postgres:17
    restart: always
    container_name: db
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - gregory_network

  gregory:
    container_name: gregory
    restart: always
    image: amaralbruno/gregory-ai:latest
    build: .
    volumes:
      - ./django/media:/code/media                  # user uploads (persist)
      - ./django/models:/code/models                # trained ML models (persist)
      - ./django/summary_cache:/code/summary_cache  # LLM summary cache (persist)
      - ./django/static:/code/static                # collectstatic output (host nginx reads it)
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DOMAIN_NAME=${DOMAIN_NAME}
      - EMAIL_DOMAIN=${EMAIL_DOMAIN}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_POSTMARK_API_URL=${EMAIL_POSTMARK_API_URL}
      - EMAIL_POSTMARK_API_KEY=${EMAIL_POSTMARK_API_KEY}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - SECRET_KEY=${SECRET_KEY}
      - FERNET_SECRET_KEY=${FERNET_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - EXTRA_ALLOWED_HOSTS=${EXTRA_ALLOWED_HOSTS}
    networks:
      - gregory_network
    depends_on:
      - db

networks:
  gregory_network:
    external: false
    name: gregory_network
  default:
    driver: bridge
