name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    # Reuse the published image: it already has the heavy deps (torch,
    # tensorflow, transformers) installed, so CI doesn't reinstall them.
    container:
      image: amaralbruno/gregory-ai:latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gregory_test
          POSTGRES_USER: postgres
          # Throwaway CI database reachable only on the job network; trust auth
          # avoids hardcoding a password (which secret scanners flag).
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_DB: gregory_test
      POSTGRES_USER: postgres
      DB_HOST: postgres
    steps:
      - uses: actions/checkout@v6

      - name: Run pytest
        working-directory: django
        # SECRET_KEY / FERNET_SECRET_KEY are generated per-run so no secrets
        # live in the repo; they only need to be valid for the test process.
        run: |
          export SECRET_KEY="$(python -c 'import secrets; print(secrets.token_urlsafe(50))')"
          export FERNET_SECRET_KEY="$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')"
          pytest -p no:cacheprovider

  # Static gate for "hollow" error handling: bare `except:` and `except: pass`
  # (the empty catch block). Runs on a bare runner — no ML image needed — so it
  # finishes in seconds, in parallel with the test suite. Config: ruff.toml.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
      - name: Ruff — empty-catch gate (E722/S110/S112)
        # Version pinned so CI and local `uvx ruff` never drift. Config: ruff.toml.
        run: uvx ruff@0.15.17 check django/
